services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-rest-backend
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
